services:

  # ── Honeypot (Flask API via Gunicorn) ─────────────────────
  honeypot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: honeypot
    image: maze-myth-honeypot:latest
    container_name: maze-myth-honeypot
    restart: unless-stopped
    ports:
      - "${HONEYPOT_PORT:-8001}:8001"
    environment:
      - GOOGLE_API_KEY=${GEMINI_API_KEY}
      - HONEYPOT_URL=${HONEYPOT_URL:-http://localhost:8001}
      - LLM_MODEL=${LLM_MODEL:-gemini-3.0-flash}
    volumes:
      - honeypot-logs:/app/log_files
      - honeypot-db:/app/databases
      - honeypot-files:/app/generated_files
    networks:
      - maze-net
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8001/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Dashboard (Flask monitor via Gunicorn) ─────────────────
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: dashboard
    image: maze-myth-dashboard:latest
    container_name: maze-myth-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8002}:8002"
    volumes:
      - honeypot-logs:/app/log_files:ro
      - honeypot-db:/app/databases:ro
    networks:
      - maze-net
    depends_on:
      honeypot:
        condition: service_healthy

volumes:
  honeypot-logs:
  honeypot-db:
  honeypot-files:


networks:
  maze-net:
    driver: bridge
