# ============================================================
# GitHub Actions — Build & Push Docker Images to GHCR
# Triggers on: push to main, or manual dispatch
# ============================================================
name: Build and Publish Docker Images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]          # also trigger on version tags
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  REGISTRY: ghcr.io
  HONEYPOT_IMAGE: ghcr.io/${{ github.repository_owner }}/maze-myth-honeypot
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/maze-myth-dashboard

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # needed to push to GHCR

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (for multi-arch builds) ──────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Login to GHCR ─────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract metadata (tags + labels) ──────────────
      - name: Extract Docker metadata (honeypot)
        id: meta-honeypot
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.HONEYPOT_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      - name: Extract Docker metadata (dashboard)
        id: meta-dashboard
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DASHBOARD_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short

      # ── 6. Build & Push honeypot image ───────────────────
      - name: Build and push honeypot image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile       # Dockerfile lives in docker/ folder
          push: true
          tags: ${{ steps.meta-honeypot.outputs.tags }}
          labels: ${{ steps.meta-honeypot.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Build & Push dashboard image ──────────────────
      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.dashboard
          push: true
          tags: ${{ steps.meta-dashboard.outputs.tags }}
          labels: ${{ steps.meta-dashboard.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
